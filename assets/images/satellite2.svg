<svg width="100%" viewBox="0 0 680 560" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Animated satellite orbiting a full circular Earth with twinkling stars</title>
<desc>A satellite with solar panels moves along an elliptical orbit around a full circular Earth with simple continent shapes, while four-pointed sparkle stars twinkle around it.</desc>

<defs>
  <clipPath id="earthClip">
    <circle cx="340" cy="280" r="110"/>
  </clipPath>
</defs>

<g fill="#93A5FF">
  <path d="M100 70 L104 80 L114 84 L104 88 L100 98 L96 88 L86 84 L96 80 Z">
    <animate attributeName="opacity" values="1;0.25;1" dur="2.2s" begin="0s" repeatCount="indefinite"/>
  </path>
  <path d="M580 110 L583 117 L590 120 L583 123 L580 130 L577 123 L570 120 L577 117 Z">
    <animate attributeName="opacity" values="1;0.25;1" dur="1.8s" begin="0.4s" repeatCount="indefinite"/>
  </path>
  <path d="M610 400 L614 410 L624 414 L614 418 L610 428 L606 418 L596 414 L606 410 Z">
    <animate attributeName="opacity" values="1;0.25;1" dur="2.5s" begin="0.8s" repeatCount="indefinite"/>
  </path>
  <path d="M70 440 L73 447 L80 450 L73 453 L70 460 L67 453 L60 450 L67 447 Z">
    <animate attributeName="opacity" values="1;0.25;1" dur="2s" begin="1.1s" repeatCount="indefinite"/>
  </path>
  <path d="M470 50 L473 57 L480 60 L473 63 L470 70 L467 63 L460 60 L467 57 Z">
    <animate attributeName="opacity" values="1;0.25;1" dur="2.3s" begin="0.2s" repeatCount="indefinite"/>
  </path>
  <path d="M190 500 L193 507 L200 510 L193 513 L190 520 L187 513 L180 510 L187 507 Z">
    <animate attributeName="opacity" values="1;0.25;1" dur="1.9s" begin="1.4s" repeatCount="indefinite"/>
  </path>
  <path d="M560 480 L563 487 L570 490 L563 493 L560 500 L557 493 L550 490 L557 487 Z">
    <animate attributeName="opacity" values="1;0.25;1" dur="2.1s" begin="0.6s" repeatCount="indefinite"/>
  </path>
  <path d="M60 200 L63 207 L70 210 L63 213 L60 220 L57 213 L50 210 L57 207 Z">
    <animate attributeName="opacity" values="1;0.25;1" dur="2.4s" begin="1.7s" repeatCount="indefinite"/>
  </path>
</g>

<ellipse cx="340" cy="280" rx="230" ry="95" fill="none" stroke="#C7D2FE" stroke-width="1.5" stroke-dasharray="6 6"/>

<circle cx="340" cy="280" r="110" fill="#7C9CFF"/>
<g clip-path="url(#earthClip)">
  <ellipse cx="280" cy="240" rx="55" ry="30" fill="#8FE3B0"/>
  <ellipse cx="390" cy="310" rx="45" ry="26" fill="#8FE3B0"/>
  <ellipse cx="320" cy="330" rx="30" ry="18" fill="#8FE3B0"/>
  <circle cx="420" cy="280" r="95" fill="#2C46C7" opacity="0.28"/>
</g>

<path id="orbitpath" d="M 570 280 A 230 95 0 1 1 110 280 A 230 95 0 1 1 570 280" fill="none" stroke="none"/>

<g>
  <g transform="rotate(-18)">
    <rect x="-150" y="-16" width="90" height="32" rx="4" fill="#3B5BFD"/>
    <line x1="-150" y1="-8" x2="-60" y2="-8" stroke="#8FA6FF" stroke-width="1"/>
    <line x1="-150" y1="0" x2="-60" y2="0" stroke="#8FA6FF" stroke-width="1"/>
    <line x1="-150" y1="8" x2="-60" y2="8" stroke="#8FA6FF" stroke-width="1"/>
    <rect x="-58" y="-22" width="10" height="44" rx="3" fill="#2C46C7"/>

    <circle cx="0" cy="0" r="46" fill="#5B7CFF"/>
    <circle cx="0" cy="-6" r="14" fill="#2C46C7"/>
    <circle cx="0" cy="-6" r="8" fill="#8FA6FF"/>

    <rect x="58" y="-22" width="10" height="44" rx="3" fill="#2C46C7"/>
    <rect x="70" y="-16" width="90" height="32" rx="4" fill="#3B5BFD"/>
    <line x1="80" y1="-8" x2="170" y2="-8" stroke="#8FA6FF" stroke-width="1"/>
    <line x1="80" y1="0" x2="170" y2="0" stroke="#8FA6FF" stroke-width="1"/>
    <line x1="80" y1="8" x2="170" y2="8" stroke="#8FA6FF" stroke-width="1"/>

    <line x1="0" y1="-46" x2="0" y2="-70" stroke="#2C46C7" stroke-width="3" stroke-linecap="round"/>
    <circle cx="0" cy="-74" r="5" fill="#2C46C7"/>
  </g>
  <animateMotion dur="9s" repeatCount="indefinite" rotate="0">
    <mpath href="#orbitpath"/>
  </animateMotion>
</g>
</svg>
